<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Information Extraction from News Article</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="outer">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-inner">

      <div>
        <div class="badge">Editorial Tool</div>

        <h1>
          Information Extraction<br>
          <span>from News Article</span>
        </h1>

        <p class="hdr-sub">
          Paste any news article and extract named entities instantly.
        </p>
      </div>

      <div class="status-pill">
        <span class="dot"></span>
        Model ready
      </div>

    </div>
  </div>

  <!-- Panels -->
  <div class="panels">

    <!-- Left -->
    <div class="left">

      <div class="panel-label">Article Input</div>

      <textarea id="articleInput" placeholder="Paste your news article here…

e.g. Apple CEO Tim Cook announced a new partnership with OpenAI in San Francisco on Monday, amid growing concerns from analysts about AI regulation in the United States."></textarea>

      <button class="btn" id="extractBtn" onclick="extractEntities()">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>

        <span class="btn-text">Extract Entities</span>

      </button>

    </div>

    <!-- Right -->
    <div class="right">

      <div class="panel-label">Extracted Entities</div>

      <div class="output watermark" id="outputBox">
Extracted entities will appear here
</div>

    </div>

  </div>

</div>

<footer>
Made By <span>Marriam Shahjahan Pillai</span>
</footer>

<script src="/static/script.js"></script>

</body>
</html>
